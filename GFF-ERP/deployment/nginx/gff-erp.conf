# =============================================================================
# GFF ERP Enterprise - Nginx Configuration
# =============================================================================
# Description: Complete Nginx configuration for GFF ERP production deployment
# Version: 1.0
# Requirements: Nginx 1.24+, SSL certificates from Let's Encrypt
# =============================================================================

# ---------------------------------------------------------------------------
# Rate Limiting Zones
# ---------------------------------------------------------------------------
# General API rate limit: 120 requests per minute per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;

# Authentication rate limit: 10 requests per minute per IP (stricter)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# Upload rate limit: 10 requests per minute per IP
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ---------------------------------------------------------------------------
# Upstream Configuration - Backend (NestJS via PM2)
# ---------------------------------------------------------------------------
upstream gff_erp_backend {
    # Backend runs on localhost port 3000 (PM2 managed)
    server 127.0.0.1:3000;
    
    # Keep connections alive for better performance
    keepalive 64;
    
    # Connection timeouts
    keepalive_timeout 60s;
    keepalive_requests 100;
}

# ---------------------------------------------------------------------------
# HTTP Server - Redirect to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    
    # Server name - replace with your domain
    server_name erp.yourdomain.com;
    
    # Allow Let's Encrypt certificate validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    
    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ---------------------------------------------------------------------------
# HTTPS Server - Main Application
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    # Server name - replace with your domain
    server_name erp.yourdomain.com;
    
    # -----------------------------------------------------------------------
    # SSL Configuration (Let's Encrypt)
    # -----------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/erp.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.yourdomain.com/privkey.pem;
    
    # SSL security parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # -----------------------------------------------------------------------
    # Security Headers
    # -----------------------------------------------------------------------
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # HSTS - force HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    
    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/gff-erp-access.log main;
    error_log /var/log/nginx/gff-erp-error.log warn;
    
    # -----------------------------------------------------------------------
    # General Settings
    # -----------------------------------------------------------------------
    # Maximum upload size (50MB for documents/reports)
    client_max_body_size 50M;
    
    # Timeout settings
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
    
    # Brotli compression (if module available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml;
    
    # Connection limit
    limit_conn addr 50;
    
    # -----------------------------------------------------------------------
    # Frontend - React SPA Static Files
    # -----------------------------------------------------------------------
    location / {
        # Root directory for built frontend
        root /var/www/gff-erp;
        
        # Index file
        index index.html;
        
        # Try files, fallback to index.html for SPA routing
        try_files $uri $uri/ /index.html;
        
        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            access_log off;
        }
        
        # Cache HTML for a shorter time
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }
    
    # -----------------------------------------------------------------------
    # API - Proxy to NestJS Backend
    # -----------------------------------------------------------------------
    location /api {
        # Apply general API rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # Connection limit
        limit_conn addr 10;
        
        # Proxy to backend
        proxy_pass http://gff_erp_backend;
        proxy_http_version 1.1;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        
        # Proxy timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Error handling
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @backend_error;
    }
    
    # -----------------------------------------------------------------------
    # Authentication Endpoints - Stricter Rate Limiting
    # -----------------------------------------------------------------------
    location /api/auth/login {
        # Stricter rate limiting for login
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        
        # Proxy to backend
        proxy_pass http://gff_erp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    location /api/auth/refresh {
        # Apply auth rate limiting
        limit_req zone=auth_limit burst=10 nodelay;
        
        proxy_pass http://gff_erp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # -----------------------------------------------------------------------
    # Health Check - No Rate Limit
    # -----------------------------------------------------------------------
    location /api/health {
        # No rate limiting for health checks
        proxy_pass http://gff_erp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        access_log off;  # Don't log health checks
    }
    
    # -----------------------------------------------------------------------
    # Uploads - File Serving
    # -----------------------------------------------------------------------
    location /uploads {
        alias /opt/gff-erp/uploads;
        
        # Upload rate limiting
        limit_req zone=upload_limit burst=5 nodelay;
        
        # Security - only serve specific file types
        location ~* \.(pdf|doc|docx|xls|xlsx|jpg|jpeg|png|gif|webp)$ {
            expires 7d;
            add_header Cache-Control "private";
            add_header X-Content-Type-Options "nosniff";
        }
        
        # Deny access to executable/script files
        location ~* \.(php|php3|php4|php5|phtml|pl|py|jsp|asp|sh|cgi|exe|dll)$ {
            deny all;
            return 403;
        }
        
        # Deny access to hidden files
        location ~ /\. {
            deny all;
            return 403;
        }
    }
    
    # -----------------------------------------------------------------------
    # Backend Error Handler
    # -----------------------------------------------------------------------
    location @backend_error {
        return 502 '{"success":false,"error":{"code":"SERVICE_UNAVAILABLE","message":"The service is temporarily unavailable. Please try again later."}}';
        add_header Content-Type application/json;
    }
    
    # -----------------------------------------------------------------------
    # Block Common Attack Paths
    # -----------------------------------------------------------------------
    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block access to version control directories
    location ~* /\.(git|svn|hg)/ {
        deny all;
        return 404;
    }
    
    # Block access to environment/config files
    location ~* \.(env|env\.local|env\.production|config\.js|config\.json)$ {
        deny all;
        return 404;
    }
    
    # Block access to package manager files
    location ~* /(package\.json|package-lock\.json|yarn\.lock|composer\.json|composer\.lock)$ {
        deny all;
        return 404;
    }
    
    # Block access to node_modules
    location ~* /node_modules {
        deny all;
        return 404;
    }
    
    # Block access to common development files
    location ~* \.(md|log|sql|bak|backup|swp|swo|swn|orig)$ {
        deny all;
        return 404;
    }
    
    # Block access to common sensitive paths
    location ~* ^/(api|admin|wp-admin|phpmyadmin|phpMyAdmin|pma|myadmin|mysql-admin)/? {
        # Note: /api is allowed above, this catches attempts on non-existent paths
        # The /api location block takes precedence for legitimate requests
        deny all;
        return 404;
    }
}

# =============================================================================
# End of Configuration
# =============================================================================
# Remember to:
# 1. Replace 'erp.yourdomain.com' with your actual domain
# 2. Obtain SSL certificates with: certbot --nginx -d erp.yourdomain.com
# 3. Test configuration with: nginx -t
# 4. Reload Nginx with: systemctl reload nginx
# =============================================================================
